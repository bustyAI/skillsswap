# Alembic configuration file for SkillSwap backend

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names (date prefix + revision + slug)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# sys.path prepend - allows importing app modules
prepend_sys_path = .

# Timezone for migration timestamps (use UTC for consistency)
timezone = UTC

# Truncate slug to reasonable length
truncate_slug_length = 40

# Set to 'true' to run the environment during generation
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without source
# sourceless = false

# Version path separator - use 'os' for os.pathsep
# version_path_separator = os

# Output encoding
output_encoding = utf-8

# Database URL placeholder - actual URL loaded from environment in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Hooks to run after generating a migration
# We use ruff for formatting
hooks = ruff

ruff.type = exec
ruff.executable = uv
ruff.options = run ruff format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
